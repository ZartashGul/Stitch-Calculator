<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stitching Cost Calculator</title>
    <style>
        :root {
            --bg: #ebedf0;
            --surface: #ffffff;
            --surface-alt: #f5f6f8;
            --border: #d0d3d9;
            --text: #1a1d23;
            --text-secondary: #5a5f6b;
            --text-muted: #8b8f98;
            --accent: #1b6ec2;
            --accent-hover: #155a9e;
            --accent-light: rgba(27,110,194,0.08);
            --danger: #c0392b;
            --danger-hover: #a93226;
            --result-bg: #1a1d23;
            --result-text: #f0f0f0;
            --shadow: 0 1px 3px rgba(0,0,0,0.06);
        }

        [data-theme="dark"] {
            --bg: #111318;
            --surface: #1c1f26;
            --surface-alt: #23272f;
            --border: #333842;
            --text: #d8dae0;
            --text-secondary: #9a9faa;
            --text-muted: #5e6370;
            --accent: #4a9eed;
            --accent-hover: #3a88d4;
            --accent-light: rgba(74,158,237,0.1);
            --danger: #e05545;
            --danger-hover: #c9443a;
            --result-bg: #0d0f12;
            --result-text: #e0e2e6;
            --shadow: 0 1px 3px rgba(0,0,0,0.25);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            transition: background 0.25s, color 0.25s;
        }

        /* ── Splash Screen (mobile only) ── */
        #splash {
            position: fixed;
            inset: 0;
            z-index: 9999;
            background: #111318;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: opacity 0.4s;
        }

        #splash.hidden {
            opacity: 0;
            pointer-events: none;
        }

        #splash .splash-icon {
            width: 72px;
            height: 72px;
            border: 3px solid #4a9eed;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 20px;
        }

        #splash .splash-icon svg { width: 38px; height: 38px; }

        #splash h1 {
            color: #e0e2e6;
            font-size: 1.3rem;
            font-weight: 700;
            letter-spacing: -0.3px;
        }

        #splash p {
            color: #5e6370;
            font-size: 0.8rem;
            margin-top: 6px;
            letter-spacing: 0.5px;
        }

        #splash .splash-loader {
            margin-top: 32px;
            width: 36px;
            height: 36px;
            border: 3px solid #23272f;
            border-top-color: #4a9eed;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        @media (min-width: 601px) {
            #splash { display: none !important; }
        }

        /* ── Header ── */
        header {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 16px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: background 0.25s, border-color 0.25s;
        }

        .header-left h1 {
            font-size: 1.15rem;
            font-weight: 700;
            color: var(--text);
            letter-spacing: -0.3px;
        }

        .header-left p {
            font-size: 0.72rem;
            color: var(--text-muted);
            margin-top: 2px;
            font-family: 'Courier New', monospace;
        }

        /* ── Theme Toggle ── */
        .theme-toggle {
            background: var(--surface-alt);
            border: 1px solid var(--border);
            border-radius: 6px;
            width: 38px;
            height: 38px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: background 0.2s, border-color 0.2s;
            flex-shrink: 0;
        }

        .theme-toggle:hover { background: var(--accent-light); border-color: var(--accent); }

        .theme-toggle svg { width: 18px; height: 18px; fill: var(--text-secondary); transition: fill 0.2s; }

        .icon-moon, [data-theme="dark"] .icon-sun { display: none; }
        [data-theme="dark"] .icon-moon { display: block; }
        [data-theme="dark"] .icon-sun { display: none; }
        .icon-sun { display: block; }

        /* ── Container ── */
        .container {
            max-width: 580px;
            margin: 0 auto;
            padding: 16px;
        }

        /* ── Card ── */
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 20px;
            margin-bottom: 12px;
            transition: background 0.25s, border-color 0.25s;
        }

        .card h2 {
            font-size: 0.78rem;
            font-weight: 700;
            margin-bottom: 14px;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.8px;
        }

        /* ── Form ── */
        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .form-group { display: flex; flex-direction: column; }

        .form-group label {
            font-size: 0.7rem;
            font-weight: 600;
            color: var(--text-muted);
            margin-bottom: 4px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .form-group input,
        .form-group select {
            padding: 9px 10px;
            border: 1px solid var(--border);
            border-radius: 4px;
            font-size: 0.95rem;
            font-family: inherit;
            color: var(--text);
            background: var(--surface-alt);
            transition: border-color 0.15s, background 0.15s;
            appearance: auto;
        }

        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: var(--accent);
            background: var(--surface);
        }

        .form-group input::placeholder { color: var(--text-muted); }

        /* ── Result ── */
        .result-box {
            margin-top: 16px;
            background: var(--result-bg);
            border-radius: 4px;
            padding: 16px;
            text-align: center;
            color: var(--result-text);
            border: 1px solid transparent;
        }

        [data-theme="dark"] .result-box { border-color: var(--border); }

        .result-box .label {
            font-size: 0.68rem;
            text-transform: uppercase;
            letter-spacing: 1.2px;
            opacity: 0.6;
            font-weight: 600;
        }

        .result-box .amount {
            font-size: 2rem;
            font-weight: 700;
            margin-top: 4px;
            font-variant-numeric: tabular-nums;
        }

        .formula-display {
            margin-top: 8px;
            font-size: 0.72rem;
            opacity: 0.4;
            font-family: 'Courier New', monospace;
            word-break: break-all;
        }

        /* ── Save Button ── */
        .btn-save {
            display: block;
            width: 100%;
            margin-top: 12px;
            padding: 10px;
            background: var(--accent);
            color: #fff;
            border: none;
            border-radius: 4px;
            font-size: 0.88rem;
            font-weight: 600;
            cursor: pointer;
            letter-spacing: 0.3px;
            transition: background 0.15s;
        }

        .btn-save:hover { background: var(--accent-hover); }
        .btn-save:active { transform: scale(0.99); }
        .btn-save:disabled { background: var(--border); color: var(--text-muted); cursor: not-allowed; }

        /* ── Total Banner ── */
        .total-banner {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 14px 20px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: background 0.25s, border-color 0.25s;
        }

        .total-banner .label { font-weight: 600; font-size: 0.85rem; color: var(--text-secondary); }
        .total-banner .value { font-size: 1.3rem; font-weight: 700; color: var(--accent); font-variant-numeric: tabular-nums; }

        /* ── Records ── */
        .records-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .records-header h2 { margin-bottom: 0; }

        .btn-clear {
            background: none;
            border: 1px solid var(--danger);
            color: var(--danger);
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 0.72rem;
            font-weight: 600;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            transition: background 0.15s, color 0.15s;
        }

        .btn-clear:hover { background: var(--danger); color: #fff; }

        .record-item {
            background: var(--surface-alt);
            border: 1px solid var(--border);
            border-radius: 4px;
            padding: 12px 14px;
            margin-bottom: 6px;
            display: flex;
            align-items: center;
            transition: background 0.25s, border-color 0.25s;
        }

        .record-item:hover { border-color: var(--accent); }

        .record-item .details { flex: 1; min-width: 0; }

        .record-item .details .top-line {
            font-weight: 600;
            font-size: 0.82rem;
            color: var(--text);
            font-family: 'Courier New', monospace;
        }

        .record-item .details .sub-line {
            font-size: 0.7rem;
            color: var(--text-muted);
            margin-top: 2px;
        }

        .record-item .record-amount {
            font-size: 1rem;
            font-weight: 700;
            color: var(--accent);
            white-space: nowrap;
            margin-left: 12px;
            font-variant-numeric: tabular-nums;
        }

        .record-item .btn-delete {
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 1.1rem;
            cursor: pointer;
            margin-left: 8px;
            padding: 2px 4px;
            transition: color 0.15s;
            line-height: 1;
        }

        .record-item .btn-delete:hover { color: var(--danger); }

        .empty-state {
            text-align: center;
            padding: 24px;
            color: var(--text-muted);
            font-size: 0.82rem;
        }

        @media (max-width: 400px) {
            .form-grid { grid-template-columns: 1fr; }
            .header-left h1 { font-size: 1rem; }
            .result-box .amount { font-size: 1.6rem; }
        }
    </style>
</head>
<body>

<!-- Splash Screen (mobile) -->
<div id="splash">
    <div class="splash-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="#4a9eed" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 2L2 7l10 5 10-5-10-5z"/>
            <path d="M2 17l10 5 10-5"/>
            <path d="M2 12l10 5 10-5"/>
        </svg>
    </div>
    <h1>Stitching Calculator</h1>
    <p>COST ESTIMATION TOOL</p>
    <div class="splash-loader"></div>
</div>

<header>
    <div class="header-left">
        <h1>Stitching Cost Calculator</h1>
        <p>(Stitches &times; Rate) / 1000 &times; Head &times; Repeat</p>
    </div>
    <button class="theme-toggle" id="themeToggle" title="Toggle theme">
        <svg class="icon-sun" viewBox="0 0 24 24"><path d="M12 17a5 5 0 100-10 5 5 0 000 10zm0-15v2m0 14v2M4.22 4.22l1.42 1.42m12.72 12.72l1.42 1.42M2 12h2m16 0h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/><circle cx="12" cy="12" r="4"/></svg>
        <svg class="icon-moon" viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/></svg>
    </button>
</header>

<div class="container">

    <div class="card">
        <h2>Parameters</h2>
        <div class="form-grid">
            <div class="form-group">
                <label for="stitches">Stitches</label>
                <input type="number" id="stitches" placeholder="5000" min="0">
            </div>
            <div class="form-group">
                <label for="rate">Rate</label>
                <select id="rate"></select>
            </div>
            <div class="form-group">
                <label for="head">Head (Machine)</label>
                <select id="head">
                    <option value="24">24</option>
                    <option value="28" selected>28</option>
                    <option value="32">32</option>
                </select>
            </div>
            <div class="form-group">
                <label for="repeat">Repeat</label>
                <input type="number" id="repeat" placeholder="10" min="0">
            </div>
        </div>

        <div class="result-box">
            <div class="label">Calculated Cost</div>
            <div class="amount" id="result">0.00</div>
            <div class="formula-display" id="formulaDisplay">&mdash;</div>
        </div>

        <button class="btn-save" id="btnSave" disabled>Save Record</button>
    </div>

    <div class="total-banner">
        <span class="label">Total Accumulated</span>
        <span class="value" id="totalAmount">0.00</span>
    </div>

    <div class="card">
        <div class="records-header">
            <h2>Records</h2>
            <button class="btn-clear" id="btnClear">Clear All</button>
        </div>
        <div id="recordsList">
            <div class="empty-state">No records saved yet</div>
        </div>
    </div>

</div>

<script>
(function () {
    // ── Splash screen (mobile) ──
    var splash = document.getElementById('splash');
    if (splash) {
        setTimeout(function () {
            splash.classList.add('hidden');
            setTimeout(function () { splash.remove(); }, 500);
        }, 1800);
    }

    // ── Dark theme toggle ──
    var THEME_KEY = 'stitching_theme';
    var themeBtn = document.getElementById('themeToggle');

    function applyTheme(t) {
        document.documentElement.setAttribute('data-theme', t);
        localStorage.setItem(THEME_KEY, t);
    }

    (function initTheme() {
        var saved = localStorage.getItem(THEME_KEY);
        if (saved === 'dark' || saved === 'light') {
            applyTheme(saved);
        } else if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
            applyTheme('dark');
        }
    })();

    themeBtn.addEventListener('click', function () {
        var current = document.documentElement.getAttribute('data-theme');
        applyTheme(current === 'dark' ? 'light' : 'dark');
    });

    // ── Calculator ──
    var STORAGE_KEY = 'stitching_records';

    var elStitches = document.getElementById('stitches');
    var elRate = document.getElementById('rate');
    var elHead = document.getElementById('head');
    var elRepeat = document.getElementById('repeat');
    var elResult = document.getElementById('result');
    var elFormula = document.getElementById('formulaDisplay');
    var elBtnSave = document.getElementById('btnSave');
    var elTotal = document.getElementById('totalAmount');
    var elRecordsList = document.getElementById('recordsList');
    var elBtnClear = document.getElementById('btnClear');

    (function populateRates() {
        for (var r = 1.3; r <= 2.5; r = Math.round((r + 0.1) * 10) / 10) {
            var opt = document.createElement('option');
            opt.value = r;
            opt.textContent = r.toFixed(1);
            elRate.appendChild(opt);
        }
    })();

    function calculate() {
        var stitches = parseFloat(elStitches.value) || 0;
        var rate = parseFloat(elRate.value) || 0;
        var head = parseFloat(elHead.value) || 0;
        var repeat = parseFloat(elRepeat.value) || 0;
        var cost = (stitches * rate) / 1000 * head * repeat;

        elResult.textContent = cost.toFixed(2);
        elBtnSave.disabled = cost <= 0;

        if (stitches > 0 && repeat > 0) {
            elFormula.textContent = '(' + stitches + ' x ' + rate + ') / 1000 x ' + head + ' x ' + repeat + ' = ' + cost.toFixed(2);
        } else {
            elFormula.textContent = '\u2014';
        }
    }

    elStitches.addEventListener('input', calculate);
    elRate.addEventListener('change', calculate);
    elHead.addEventListener('change', calculate);
    elRepeat.addEventListener('input', calculate);

    function loadRecords() {
        try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; }
        catch (e) { return []; }
    }

    function saveRecords(records) {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(records));
    }

    function renderRecords() {
        var records = loadRecords();

        if (records.length === 0) {
            elRecordsList.innerHTML = '<div class="empty-state">No records saved yet</div>';
            elTotal.textContent = '0.00';
            elBtnClear.style.display = 'none';
            return;
        }

        elBtnClear.style.display = '';
        var total = 0;
        var html = '';

        for (var i = records.length - 1; i >= 0; i--) {
            var r = records[i];
            total += r.cost;
            html += '<div class="record-item">' +
                '<div class="details">' +
                    '<div class="top-line">St:' + r.stitches + ' | R:' + r.rate + ' | H:' + r.head + ' | Rep:' + r.repeat + '</div>' +
                    '<div class="sub-line">' + r.date + '</div>' +
                '</div>' +
                '<div class="record-amount">' + r.cost.toFixed(2) + '</div>' +
                '<button class="btn-delete" data-index="' + i + '" title="Delete">&times;</button>' +
            '</div>';
        }

        elRecordsList.innerHTML = html;
        elTotal.textContent = total.toFixed(2);
    }

    elBtnSave.addEventListener('click', function () {
        var stitches = parseFloat(elStitches.value) || 0;
        var rate = parseFloat(elRate.value) || 0;
        var head = parseFloat(elHead.value) || 0;
        var repeat = parseFloat(elRepeat.value) || 0;
        var cost = (stitches * rate) / 1000 * head * repeat;

        if (cost <= 0) return;

        var records = loadRecords();
        records.push({ stitches: stitches, rate: rate, head: head, repeat: repeat, cost: cost, date: new Date().toLocaleString() });
        saveRecords(records);
        renderRecords();

        elStitches.value = '';
        elRepeat.value = '';
        calculate();
        elStitches.focus();
    });

    elRecordsList.addEventListener('click', function (e) {
        var btn = e.target.closest('.btn-delete');
        if (!btn) return;
        var idx = parseInt(btn.dataset.index, 10);
        var records = loadRecords();
        records.splice(idx, 1);
        saveRecords(records);
        renderRecords();
    });

    elBtnClear.addEventListener('click', function () {
        if (!confirm('Clear all saved records?')) return;
        saveRecords([]);
        renderRecords();
    });

    renderRecords();
    calculate();
})();
</script>

</body>
</html>
